<!doctype html>
<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Teachable Machine App</title>
      <style>
         body {
            font-family: sans-serif;
            max-width: 600px;
            margin: 2rem auto;
            padding: 0 1rem;
            text-align: center;
         }

         #webcam-container canvas {
            display: none;
            border-radius: 8px;
         }

         #webcam-container.active canvas {
            display: block;
         }

         #label-container div {
            font-size: 1.1rem;
            padding: 0.25rem 0;
         }

         button {
            padding: 0.6rem 1.5rem;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 6px;
            border: none;
            color: white;
            background: #2563eb;
            margin: 1rem 0;
         }

         button.stop {
            background: #dc2626;
         }

         button:hover {
            opacity: 0.9;
         }
      </style>
   </head>

   <body>
      <h1>My Teachable Machine App</h1>

      <button id="toggleButton" onclick="toggleCamera()">Start Camera</button>

      <div id="webcam-container"></div>
      <div id="label-container"></div>

      <div
         id="quiz-container"
         style="
            margin-top: 20px;
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 8px;
            display: none;
         "
      >
         <h2 id="question-text">Question will appear here</h2>
         <div
            id="options-container"
            style="text-align: left; display: inline-block"
         ></div>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
      <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
      <script>
         const URL =
            "https://teachablemachine.withgoogle.com/models/UOZdbi7iB/";

         let model, webcam, labelContainer, maxPredictions;
         let isRunning = false;

         let currentQuestionIndex = 0;
         let quizData = [];

         async function init() {
            model = await tmImage.load(
               URL + "model.json",
               URL + "metadata.json",
            );
            maxPredictions = model.getTotalClasses();

            webcam = new tmImage.Webcam(300, 300, true);
            await webcam.setup();
            await webcam.play();

            const container = document.getElementById("webcam-container");
            container.innerHTML = "";
            container.appendChild(webcam.canvas);
            container.classList.add("active");

            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = "";
            for (let i = 0; i < maxPredictions; i++) {
               labelContainer.appendChild(document.createElement("div"));
            }
            await loadQuiz();

            isRunning = true;
            window.requestAnimationFrame(loop);
         }

         async function loop() {
            if (!isRunning) return;
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
         }

         const questionToId = new Map();
         const idToDetails = new Map();

         async function loadQuiz() {
            quizData = [
               {
                  id: "q1",
                  question: "How many 'R's are there in 'Strawberry'?",
                  options: { A: "1", B: "2", C: "3" },
                  answer: "C",
               },
               {
                  id: "q2",
                  question: "How did Keller hurt his ankle last quarter?",
                  options: {
                     A: "Grading Assignments",
                     B: "Fell down the stairs",
                     C: "Lost a fight to AI",
                  },
                  answer: "B",
               },
               {
                  id: "q3",
                  question: "What building are we in right now?",
                  options: {
                     A: "Auburn Center",
                     B: "McDonald's",
                     C: "We're in a building?",
                  },
                  answer: "A",
               },
               {
                  id: "q4",
                  question: "What does the fox say?",
                  options: {
                     A: "Chomp Chomp",
                     B: "Ring-ding-ding-ding-dingeringeding",
                     C: "What's a fox?",
                  },
                  answer: "B",
               },
               {
                  id: "q5",
                  question: "What is the name of our professor?",
                  options: {
                     A: "Keller",
                     B: "Morpheus",
                     C: "AI",
                  },
                  answer: "A",
               },
            ];

            quizData.forEach((item) => {
               questionToId.set(item.question, item.id);

               idToDetails.set(item.id, {
                  options: item.options,
                  correct: item.answer,
               });
            });

            displayQuestion(currentQuestionIndex);
         }

         function displayQuestion(index) {
            const quizContainer = document.getElementById("quiz-container");
            const questionText = document.getElementById("question-text");
            const optionsContainer =
               document.getElementById("options-container");

            if (!quizData[index]) return;

            quizContainer.style.display = "block";
            const item = quizData[index];

            questionText.innerText = item.question;
            optionsContainer.innerHTML = "";

            for (const [letter, text] of Object.entries(item.options)) {
               const optionDiv = document.createElement("div");
               optionDiv.innerHTML = `<strong>${letter}:</strong> ${text}`;
               optionDiv.style.margin = "10px 0";
               optionsContainer.appendChild(optionDiv);
            }
         }

         async function predict() {
            const prediction = await model.predict(webcam.canvas);
            const questionHeader = document.getElementById("question-text");

            // Find the class with the highest probability
            let topClass = prediction[0];
            for (let i = 1; i < prediction.length; i++) {
               if (prediction[i].probability > topClass.probability) {
                  topClass = prediction[i];
               }
            }

            // topClass.className is the winning label
            // topClass.probability is how confident the model is
            console.log(topClass.className, topClass.probability);

            const currentItem = quizData[currentQuestionIndex];
            const details = idToDetails.get(currentItem.id);

            if (topClass.probability > 0.7) {
               if (topClass.className === details.correct) {
                  questionHeader.innerText = "✅ Correct!";
                  questionHeader.style.color = "green";

                  isRunning = false;

                  setTimeout(() => {
                     currentQuestionIndex++;
                     if (currentQuestionIndex < quizData.length) {
                        questionHeader.style.color = "black";
                        displayQuestion(currentQuestionIndex);
                        isRunning = true;
                        window.requestAnimationFrame(loop);
                     } else {
                        questionHeader.innerText = "Quiz Complete! 🎉";
                        document.getElementById("options-container").innerHTML =
                           "";
                     }
                  }, 2000);
               } else if (topClass.className !== "Background") {
                  questionHeader.innerText = `❌ Incorrect (You signed: ${topClass.className})`;
                  questionHeader.style.color = "red";

                  setTimeout(() => {
                     if (isRunning) {
                        questionHeader.innerText = currentItem.question;
                        questionHeader.style.color = "black";
                     }
                  }, 1500);
               }
            }

            // Update the display
            for (let i = 0; i < maxPredictions; i++) {
               const classPrediction =
                  prediction[i].className +
                  ": " +
                  prediction[i].probability.toFixed(2);
               labelContainer.childNodes[i].innerHTML = classPrediction;
            }
         }

         async function toggleCamera() {
            const button = document.getElementById("toggleButton");
            if (!isRunning) {
               await init();
               button.textContent = "Stop Camera";
               button.classList.add("stop");
            } else {
               isRunning = false;
               webcam.stop();
               document
                  .getElementById("webcam-container")
                  .classList.remove("active");
               button.textContent = "Start Camera";
               button.classList.remove("stop");
            }
         }
      </script>
   </body>
</html>
